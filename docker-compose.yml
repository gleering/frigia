services:
  postgres:
    image: postgres:16-alpine
    container_name: frigia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: frigia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-frigia_dev_password}
      POSTGRES_DB: frigia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frigia -d frigia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frigia_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://frigia:${POSTGRES_PASSWORD:-frigia_dev_password}@postgres:5432/frigia_db
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - production

volumes:
  postgres_data:
